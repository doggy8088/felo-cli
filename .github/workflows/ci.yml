name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version.outputs.changed }}
      previous_version: ${{ steps.version.outputs.previous }}
      current_version: ${{ steps.version.outputs.current }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Detect package version change
        id: version
        shell: bash
        run: |
          current_version="$(node -p "require('./package.json').version")"
          published_version="$(npm view @willh/felo-cli version 2>/dev/null || true)"

          changed="false"
          if [ "$published_version" != "$current_version" ]; then
            changed="true"
          fi

          echo "previous=$published_version" >> "$GITHUB_OUTPUT"
          echo "current=$current_version" >> "$GITHUB_OUTPUT"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build

  publish:
    runs-on: ubuntu-latest
    needs: ci
    if: needs.ci.outputs.version_changed == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --provenance --access public
